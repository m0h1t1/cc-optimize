<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoPay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 420px;
      background: #1a1a2e;
      color: #ccd6f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 16px;
      background: #16213e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .header p {
      font-size: 11px;
      color: #8892b0;
      margin-top: 4px;
    }

    .section {
      padding: 12px 16px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64ffda;
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* Search */
    #card-search {
      width: 100%;
      padding: 10px 12px;
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #ccd6f6;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    #card-search:focus {
      border-color: #64ffda;
    }
    #card-search::placeholder {
      color: #5a6380;
    }

    #search-results {
      display: none;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 4px;
      background: #16213e;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .search-item {
      padding: 10px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .search-item:hover {
      background: rgba(100,255,218,0.08);
    }

    /* Cards */
    .card-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .card-item:last-child { border-bottom: none; }

    .card-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-network {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-network.visa { background: #1a1f71; color: #fff; }
    .card-network.mastercard { background: #eb001b; color: #fff; }
    .card-network.amex { background: #006fcf; color: #fff; }
    .card-network.discover { background: #ff6000; color: #fff; }

    .card-name { font-size: 13px; }

    .remove-btn {
      background: none;
      border: none;
      color: #8892b0;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    .remove-btn:hover { color: #ff6b6b; }

    /* Rank */
    .rank-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 8px;
    }
    .rank-row:last-child { border-bottom: none; }

    .rank-category {
      font-size: 11px;
      text-transform: capitalize;
      color: #8892b0;
      width: 70px;
      flex-shrink: 0;
    }
    .rank-card {
      flex: 1;
      font-size: 12px;
      color: #ccd6f6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-rate {
      font-weight: 700;
      color: #64ffda;
      font-size: 12px;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 16px 0;
      color: #5a6380;
    }
    .hint {
      color: #5a6380;
      font-size: 12px;
      text-align: center;
      padding: 8px 0;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MoPay</h1>
    <p>Maximize your credit card rewards</p>
  </div>

  <div class="section">
    <div class="section-title">Add a Card</div>
    <input type="text" id="card-search" placeholder="Search cards (e.g. Amex Gold, Chase...)" />
    <div id="search-results"></div>
  </div>

  <hr class="divider" />

  <div class="section">
    <div class="section-title">Your Wallet</div>
    <div id="wallet-cards"></div>
  </div>

  <hr class="divider" />

  <div class="section">
    <div class="section-title">Best Card by Category</div>
    <div id="quick-rank"></div>
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
