<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoPay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 420px;
      background: #ffffff;
      color: #2d3a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 20px 16px;
      background: linear-gradient(180deg, #3a7d4a 0%, #4a9c5e 100%);
      border-bottom: none;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .header p {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
    }

    .section {
      padding: 12px 16px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4a9c5e;
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* Search */
    #card-search {
      width: 100%;
      padding: 10px 12px;
      background: #f7faf7;
      border: 1px solid #d6e5d8;
      border-radius: 8px;
      color: #2d3a2e;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    #card-search:focus {
      border-color: #4a9c5e;
    }
    #card-search::placeholder {
      color: #a3b5a5;
    }

    #search-results {
      display: none;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 4px;
      background: #f7faf7;
      border-radius: 8px;
      border: 1px solid #e4ece5;
    }
    .search-item {
      padding: 10px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .search-item:hover {
      background: #edf5ee;
    }

    /* Cards */
    .card-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f5f0;
    }
    .card-item:last-child { border-bottom: none; }

    .card-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-network {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-network.visa { background: #1a1f71; color: #fff; }
    .card-network.mastercard { background: #eb001b; color: #fff; }
    .card-network.amex { background: #006fcf; color: #fff; }
    .card-network.discover { background: #ff6000; color: #fff; }

    .card-name {
      font-size: 13px;
      color: #2d3a2e;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #b0bfb2;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    .remove-btn:hover { color: #d44; }

    /* Merchant detection */
    .merchant-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #edf5ee;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .merchant-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4a9c5e;
      flex-shrink: 0;
    }
    .merchant-domain {
      font-size: 12px;
      color: #2d3a2e;
      font-weight: 500;
    }
    .merchant-category {
      font-size: 10px;
      color: #3a7d4a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: auto;
      background: #dceede;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .no-merchant {
      text-align: center;
      color: #a3b5a5;
      font-size: 12px;
      padding: 8px 0;
    }

    /* Find best card button */
    .find-btn {
      width: 100%;
      padding: 12px;
      background: #4a9c5e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .find-btn:hover { background: #3d8a4f; }
    .find-btn:active { transform: scale(0.98); }
    .find-btn:disabled {
      background: #c8d9ca;
      color: #fff;
      cursor: not-allowed;
      transform: none;
    }

    /* Card result display */
    .result-container {
      display: none;
      margin-top: 12px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-visual {
      width: 100%;
      aspect-ratio: 1.586;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .card-visual::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .card-visual.visa { background: linear-gradient(135deg, #1a1f71 0%, #2d3494 50%, #1a1f71 100%); }
    .card-visual.mastercard { background: linear-gradient(135deg, #1a1a2e 0%, #2d1b3d 50%, #1a1a2e 100%); }
    .card-visual.amex { background: linear-gradient(135deg, #006fcf 0%, #0088ff 50%, #006fcf 100%); }
    .card-visual.discover { background: linear-gradient(135deg, #2d2d2d 0%, #444 50%, #2d2d2d 100%); }

    .card-visual-network {
      font-size: 14px;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
    }
    .card-visual-chip {
      width: 36px;
      height: 26px;
      border-radius: 4px;
      background: linear-gradient(135deg, #d4af37, #c5a028);
      position: relative;
    }
    .card-visual-chip::after {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 2px;
    }
    .card-visual-name {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.5px;
      position: relative;
    }

    .result-details {
      margin-top: 12px;
      text-align: center;
    }
    .result-card-name {
      font-size: 16px;
      font-weight: 700;
      color: #1a2e1a;
      margin-bottom: 4px;
    }
    .result-rate {
      font-size: 24px;
      font-weight: 800;
      color: #3a7d4a;
      margin: 8px 0 4px;
    }
    .result-reason {
      font-size: 12px;
      color: #7a8f7c;
    }
    .result-disclaimer {
      font-size: 10px;
      color: #a3b5a5;
      font-style: italic;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #e4ece5;
    }

    .empty-state {
      text-align: center;
      padding: 16px 0;
      color: #a3b5a5;
    }
    .hint {
      color: #a3b5a5;
      font-size: 12px;
      text-align: center;
      padding: 8px 0;
    }

    .divider {
      border: none;
      border-top: 1px solid #e4ece5;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MoPay</h1>
    <p>Maximize your credit card rewards</p>
  </div>

  <div class="section">
    <div class="section-title">Add a Card</div>
    <input type="text" id="card-search" placeholder="Search cards (e.g. Amex Gold, Chase...)" />
    <div id="search-results"></div>
  </div>

  <hr class="divider" />

  <div class="section">
    <div class="section-title">Your Wallet</div>
    <div id="wallet-cards"></div>
  </div>

  <hr class="divider" />

  <div class="section">
    <div class="section-title">Best Card for This Site</div>
    <div id="merchant-status"></div>
    <button id="find-best-btn" class="find-btn" disabled>Find My Best Card</button>
    <div id="card-result" class="result-container"></div>
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
